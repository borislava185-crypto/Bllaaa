<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BSL Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
width: 100%; height: 100dvh;
background: #030310;
font-family: ‘Fredoka’, sans-serif;
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}

/* ── The game lives in a phone-shaped box, centred on screen ── */
#game-shell {
width: min(520px, 100vw);
height: 100dvh;
position: relative;
overflow: hidden;
display: flex;
flex-direction: column;
background: linear-gradient(180deg, #0a1e0a 0%, #0a3018 60%, #061408 100%);
}

/* ── SCREENS: only .active one is shown ── */
.screen { display: none; position: absolute; inset: 0; flex-direction: column; }
.screen.active { display: flex; }

/* ════════════════════════════════
TITLE SCREEN
════════════════════════════════ */
#scr-title {
background: linear-gradient(180deg, #0a1e0a, #0a3018 55%, #061408);
align-items: center;
justify-content: center;
gap: 14px;
text-align: center;
padding: 24px;
position: relative;
}
#scr-title .bg-art { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
#scr-title h1 {
font-family: ‘Press Start 2P’, monospace;
font-size: clamp(22px, 5vw, 34px);
color: #ffd232;
text-shadow: 0 0 30px #ffd232;
line-height: 1.5;
}
#scr-title p { font-size: 16px; color: #8888bb; line-height: 1.6; }
#title-luna { width: 90px; height: 112px; }
#scr-title button {
padding: 14px 48px;
font-family: ‘Press Start 2P’, monospace;
font-size: 13px;
background: linear-gradient(135deg, #a78bfa, #ffd232);
border: none; border-radius: 14px; color: white; cursor: pointer;
box-shadow: 0 0 28px rgba(255,210,50,0.4);
margin-top: 4px;
}
.chap { font-family: ‘Press Start 2P’, monospace; font-size: 7px; color: #555; margin-top: 2px; }

/* ════════════════════════════════
GAME SCREEN — 3 rows: HUD | BG | BOTTOM
════════════════════════════════ */
#scr-game { background: linear-gradient(180deg, #0a1e0a, #0a3018 60%, #061408); }

/* Row 1: HUD */
#hud {
flex-shrink: 0;
padding: 8px 14px 6px;
background: rgba(4,4,18,0.92);
display: flex; flex-direction: column; gap: 5px;
}
.hud-top { display: flex; justify-content: space-between; align-items: center; }
.hud-title { font-family: ‘Press Start 2P’, monospace; font-size: 9px; color: #ffd232; }
#badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
.badge {
font-family: ‘Press Start 2P’, monospace; font-size: 6px;
padding: 3px 8px; border: 1px solid #ffd232; border-radius: 20px;
color: #ffd232; background: rgba(255,210,50,0.1);
}
.xp-row { display: flex; align-items: center; gap: 7px; }
.lvl { font-family: ‘Press Start 2P’, monospace; font-size: 7px; color: #ffd232; white-space: nowrap; }
.xp-track { flex: 1; height: 9px; background: #111; border-radius: 6px; overflow: hidden; border: 1px solid #2a2a5a; }
.xp-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #ffd232); border-radius: 6px; width: 0%; transition: width 0.8s; }
.xp-num { font-family: ‘Press Start 2P’, monospace; font-size: 6px; color: #555; white-space: nowrap; }

/* Row 2: Background space */
#bg-space { flex: 1; position: relative; min-height: 0; }
#particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 5; }
#cam-view { position: absolute; top: 8px; right: 10px; width: 130px; border-radius: 10px; overflow: hidden; border: 2px solid #333; display: none; z-index: 6; }
#cam-view video { width: 100%; display: block; transform: scaleX(-1); }

/* Row 3: Bottom panel — Luna + content side by side */
#bottom {
flex-shrink: 0;
display: flex;
align-items: flex-end;
background: rgba(4,4,18,0.6);
padding: 0 12px 0 10px;
gap: 8px;
}

/* Luna SVG */
#luna {
width: 90px;
height: 112px;
flex-shrink: 0;
align-self: flex-end;
}

/* Content beside luna */
#bottom-content { flex: 1; min-width: 0; padding-bottom: 0; }

/* Dialogue bubble */
#dlg-wrap { display: none; padding: 8px 0; }
#dlg-box {
background: rgba(12,16,50,0.97);
border: 2px solid #1e3060;
border-radius: 12px;
padding: 14px 14px 10px;
position: relative;
}
#dlg-name {
position: absolute; top: -12px; left: 12px;
background: linear-gradient(90deg, #a78bfa, #ffd232);
font-family: ‘Press Start 2P’, monospace; font-size: 7px;
border-radius: 4px; padding: 2px 10px; color: white;
}
#dlg-text { font-size: 16px; font-weight: 600; color: #e8e8ff; line-height: 1.45; min-height: 46px; }
#dlg-tap {
margin-top: 8px; text-align: center;
font-family: ‘Press Start 2P’, monospace; font-size: 7px;
color: #ffd232; cursor: pointer; display: none;
}

/* Choice buttons */
#choices-wrap { display: none; padding: 8px 0; }
#choices-q {
font-family: ‘Press Start 2P’, monospace; font-size: 7px;
color: #888; text-align: center; margin-bottom: 7px;
}
#choices-row { display: flex; gap: 8px; }
.choice {
flex: 1; border-radius: 12px; padding: 7px 6px 8px;
cursor: pointer; display: flex; flex-direction: column;
align-items: stretch; gap: 6px;
border: 2px solid; background: transparent;
transition: transform 0.15s;
}
.choice:hover { transform: translateY(-3px); }
.choice.yes    { border-color: #fbbf24; box-shadow: 0 0 14px rgba(251,191,36,.3); }
.choice.no     { border-color: #f87171; box-shadow: 0 0 14px rgba(248,113,113,.3); }
.choice.forest { border-color: #4ade80; box-shadow: 0 0 14px rgba(74,222,128,.3); }
.choice.city   { border-color: #60a5fa; box-shadow: 0 0 14px rgba(96,165,250,.3); }
.cvid { border-radius: 8px; overflow: hidden; height: 160px; background: #111; position: relative; }
.cvid video { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }

.cvid-fb { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-decoration: none; gap: 3px; padding: 6px; }
.clbl { font-family: ‘Press Start 2P’, monospace; font-size: 7px; text-align: center; }
.choice.yes .clbl    { color: #fbbf24; }
.choice.no .clbl     { color: #f87171; }
.choice.forest .clbl { color: #4ade80; }
.choice.city .clbl   { color: #60a5fa; }
.tap-note { text-align: center; font-family: ‘Press Start 2P’, monospace; font-size: 6px; color: #333; margin-top: 5px; }

/* Toolbar */
#toolbar {
flex-shrink: 0;
padding: 6px 12px 10px;
background: rgba(4,4,18,0.92);
display: flex; justify-content: space-between;
}
#toolbar button {
font-family: ‘Press Start 2P’, monospace; font-size: 7px;
padding: 6px 14px; border-radius: 8px; cursor: pointer; border: 1px solid;
}
#cam-btn { background: rgba(255,255,255,.04); border-color: #333; color: #666; }
#help-btn { background: rgba(255,210,50,.08); border-color: #ffd232; color: #ffd232; }

/* ════════════════════════════════
ENDING SCREEN
════════════════════════════════ */
#scr-ending {
align-items: center; justify-content: center;
text-align: center; position: relative; overflow: hidden;
background: transparent !important;
}
.end-cat { font-size: 56px; }
#scr-ending h2 { font-family: ‘Press Start 2P’, monospace; font-size: 16px; color: #ffd232; text-shadow: 0 0 20px #ffd232; }
#scr-ending p { font-size: 16px; color: #ccc; }
.xp-card { border: 2px solid #ffd232; border-radius: 12px; padding: 14px 26px; background: rgba(255,210,50,.08); }
.xp-lbl { font-family: ‘Press Start 2P’, monospace; font-size: 8px; color: #888; }
.xp-num { font-family: ‘Press Start 2P’, monospace; font-size: 26px; color: #ffd232; margin: 4px 0; }
.xp-words { font-size: 14px; color: #4ade80; }
#end-btn { padding: 13px 36px; font-family: ‘Press Start 2P’, monospace; font-size: 10px; color: white; border: none; border-radius: 12px; cursor: pointer; }

/* ════════════════════════════════
HELP MODAL (full viewport overlay)
════════════════════════════════ */
#modal {
position: fixed; inset: 0;
background: rgba(0,0,0,.88); backdrop-filter: blur(6px);
display: none; align-items: center; justify-content: center; z-index: 999;
}
#modal.open { display: flex; }
#modal-box {
background: #0f1729; border: 2px solid #1e3060; border-radius: 20px;
padding: 26px 24px; max-width: 460px; width: 92%;
}
#modal h3 { font-family: ‘Press Start 2P’, monospace; font-size: 11px; color: #ffd232; text-align: center; margin-bottom: 6px; }
#modal .msub { font-size: 13px; color: #888; text-align: center; margin-bottom: 18px; }
#modal-signs { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.msign { flex: 1 1 130px; max-width: 180px; background: rgba(255,255,255,.04); border: 1px solid #1e3060; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
.msign .cvid { border-radius: 8px; height: 140px; }
.msign-lbl { font-family: ‘Press Start 2P’, monospace; font-size: 8px; color: #e8e8ff; text-align: center; }
#modal button { display: block; margin: 18px auto 0; padding: 10px 28px; background: linear-gradient(135deg,#a78bfa,#ffd232); color: white; border: none; border-radius: 22px; font-family: ‘Press Start 2P’, monospace; font-size: 9px; cursor: pointer; }

/* Particle animations */
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes rise { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-220px) rotate(540deg);opacity:0} }
@keyframes fall { 0%{transform:translateY(0);opacity:0} 20%{opacity:1} 100%{transform:translateY(160px);opacity:0} }
</style>

</head>

<script>
/* ══════════════ LUNA CHARACTER ══════════════ */
function lunaHTML(mood) {
  const c = {wave:'#6366f1',excited:'#f59e0b',sad:'#64748b',pleading:'#8b5cf6'}[mood]||'#6366f1';
  const smile = mood==='excited'||mood==='wave';
  const sad   = mood==='sad';
  const blush = mood==='wave'||mood==='excited'||mood==='pleading';
  const mouth = smile ? 'M38,58 Q50,68 62,58' : sad ? 'M38,64 Q50,56 62,64' : 'M38,60 Q50,65 62,60';
  return `
    <ellipse cx="50" cy="126" rx="20" ry="5" fill="rgba(0,0,0,.4)"/>
    <rect x="33" y="78" width="34" height="42" rx="10" fill="${c}"/>
    <rect x="31" y="78" width="38" height="13" rx="7" fill="${sad?'#94a3b8':'#f472b6'}"/>
    <rect x="20" y="80" width="13" height="26" rx="6" fill="${c}"/>
    <rect x="67" y="80" width="13" height="26" rx="6" fill="${c}"/>
    <rect x="37" y="112" width="11" height="22" rx="5" fill="${c}"/>
    <rect x="52" y="112" width="11" height="22" rx="5" fill="${c}"/>
    <ellipse cx="43" cy="131" rx="9" ry="5" fill="#1e293b"/>
    <ellipse cx="57" cy="131" rx="9" ry="5" fill="#1e293b"/>
    <rect x="43" y="66" width="14" height="14" rx="5" fill="#fde68a"/>
    <ellipse cx="50" cy="48" rx="27" ry="28" fill="#fef3c7"/>
    <polygon points="23,25 15,5 33,21" fill="${c}"/>
    <polygon points="77,25 85,5 67,21" fill="${c}"/>
    <polygon points="26,23 20,11 31,21" fill="#fca5a5"/>
    <polygon points="74,23 80,11 69,21" fill="#fca5a5"/>
    <ellipse cx="50" cy="23" rx="25" ry="13" fill="#7c3aed"/>
    <rect x="25" y="22" width="10" height="21" rx="5" fill="#7c3aed"/>
    <rect x="65" y="22" width="10" height="21" rx="5" fill="#7c3aed"/>
    ${sad
      ? '<path d="M36,44 Q40,48 44,44" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M56,44 Q60,48 64,44" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/>'
      : '<ellipse cx="40" cy="46" rx="6" ry="7" fill="#1e293b"/><ellipse cx="60" cy="46" rx="6" ry="7" fill="#1e293b"/><circle cx="43" cy="43" r="2.5" fill="white"/><circle cx="63" cy="43" r="2.5" fill="white"/>'}
    ${blush ? '<ellipse cx="30" cy="54" rx="7" ry="4" fill="#fca5a5" opacity=".5"/><ellipse cx="70" cy="54" rx="7" ry="4" fill="#fca5a5" opacity=".5"/>' : ''}
    <path d="${mouth}" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="50" cy="56" rx="5" ry="3.5" fill="#fca5a5"/>`;
}

/* ══════════════ BSL VIDEOS ══════════════ */
const SIGNS = {
  yes:    {color:'#fbbf24', hint:'Fist nods forward twice',            url:'https://raw.githubusercontent.com/borislava185-crypto/Bllaaa/main/2026-04-08%2009%3A19%3A34.mov',    },
  no:     {color:'#f87171', hint:'Both fists, pinky up, tap together', url:'https://raw.githubusercontent.com/borislava185-crypto/Bllaaa/main/higgsfield-714207dc-32dc-47b5-b10f-f211c39838b0.mov',     },
  forest: {color:'#4ade80', hint:'Open hand sways from elbow',         url:'https://media.signbsl.com/videos/bsl/signstation/forest.mp4'},
  city:   {color:'#60a5fa', hint:'Index finger taps index finger',     url:'https://media.signbsl.com/videos/bsl/signstation/city.mp4'},
};

function makeVideo(sign) {
  const d = SIGNS[sign];
  const wrap = document.createElement('div');
  wrap.className = 'cvid';
  const vid = document.createElement('video');
  vid.autoplay = vid.loop = vid.muted = vid.playsInline = true;
  vid.style.objectFit = "contain";
  vid.src = d.url;
  vid.onerror = () => showFallback(wrap, sign);
  wrap.appendChild(vid);

  return wrap;
}

function showFallback(wrap, sign) {
  const d = SIGNS[sign];
  wrap.innerHTML = '';
  wrap.style.cssText += ';background:#111;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;padding:10px;';
  wrap.innerHTML = `<div style="font-size:28px">🤟</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:6px;color:${d.color};text-align:center;line-height:1.8">${sign.toUpperCase()}</div>
    <div style="font-size:11px;color:#888;text-align:center">${d.hint}</div>`;
}

/* ══════════════ STORY ══════════════ */
const SCENES = {
  s1:    { mood:'wave',     lines:["Hi! I'm Luna! 🐾","Will you help me find my cat?"],   q:'Sign your answer!',      choices:[{sign:'yes',label:'YES',next:'s_yes'},{sign:'no',label:'NO',next:'s_no'}], xp:10 },
  s_no:  { mood:'sad',      lines:["That's not YES...","Please try again! 🌧️"],            q:'Will you help me?',      choices:[{sign:'yes',label:'YES',next:'s_yes'},{sign:'no',label:'NO',next:'s_no2'}], xp:0 },
  s_no2: { mood:'pleading', lines:["We don't have all day...","PLEASE help me! 🥺"],       q:'Last chance!',           choices:[{sign:'yes',label:'YES',next:'s_yes'},{sign:'no',label:'NO',next:'s_yes'}], xp:0 },
  s_yes: { mood:'excited',  lines:["YAY! Thank you! ✨","I lost my cat Mochi! 🐱","Where should we look?"], q:'Choose where to search!', choices:[{sign:'forest',label:'FOREST',next:'end_forest'},{sign:'city',label:'CITY',next:'end_city'}], xp:20 },
};

/* ══════════════ STATE ══════════════ */
let G = { scene:'s1', line:0, xp:0, level:1, unlocked:['YES','NO'], busy:false, taught:[] };
let camStream=null, typeIv=null;

/* ══════════════ SCREEN SWITCH ══════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ══════════════ GAME START ══════════════ */
function startGame() {
  showScreen('scr-game');
  loadScene('s1');
}

/* ══════════════ LOAD SCENE ══════════════ */
function loadScene(id) {
  clearInterval(typeIv); typeIv = null;
  G.scene = id; G.line = 0; G.busy = false;
  const sc = SCENES[id];
  document.getElementById('luna').innerHTML = lunaHTML(sc.mood);
  document.getElementById('dlg-wrap').style.display = 'block';
  document.getElementById('choices-wrap').style.display = 'none';
  document.getElementById('dlg-tap').style.display = 'none';
  typeText();
}

/* ══════════════ TYPEWRITER ══════════════ */
function typeText() {
  clearInterval(typeIv); typeIv = null;
  const sc = SCENES[G.scene];
  const text = sc.lines[G.line];
  const el = document.getElementById('dlg-text');
  const tap = document.getElementById('dlg-tap');
  el.textContent = ''; tap.style.display = 'none';
  let i = 0;
  typeIv = setInterval(() => {
    if (i < text.length) { el.textContent = text.slice(0, ++i); }
    else { clearInterval(typeIv); typeIv = null; tap.style.display = 'block'; }
  }, 35);
}

function tapLine() {
  if (typeIv) { // Skip to end of current line
    clearInterval(typeIv); typeIv = null;
    const sc = SCENES[G.scene];
    document.getElementById('dlg-text').textContent = sc.lines[G.line];
    document.getElementById('dlg-tap').style.display = 'block';
    return;
  }
  const sc = SCENES[G.scene];
  if (G.line < sc.lines.length - 1) {
    G.line++;
    typeText();
  } else {
    showChoices();
  }
}

/* ══════════════ CHOICES ══════════════ */
function showChoices() {
  document.getElementById('dlg-wrap').style.display = 'none';
  document.getElementById('choices-wrap').style.display = 'block';
  const sc = SCENES[G.scene];
  document.getElementById('choices-q').textContent = sc.q;
  const row = document.getElementById('choices-row');
  row.innerHTML = '';
  sc.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice ' + c.sign;
    btn.appendChild(makeVideo(c.sign));
    const lbl = document.createElement('div');
    lbl.className = 'clbl'; lbl.textContent = c.label;
    btn.appendChild(lbl);
    btn.onclick = () => pick(c);
    row.appendChild(btn);
  });
}

/* ══════════════ PICK ══════════════ */
function pick(choice) {
  if (G.busy) return;

  // NO is never intercepted — always goes straight through
  if (choice.sign === 'no') {
    G.busy = true;
    proceedWithChoice(choice);
    return;
  }

  // Only YES gets taught the first time
  if (choice.sign === 'yes' && !G.taught.includes('yes')) {
    G.taught.push('yes');
    teachSign('yes', function() {
      // After teaching, put choices back so player can try again
      document.getElementById('dlg-wrap').style.display = 'none';
      document.getElementById('choices-wrap').style.display = 'block';
      G.busy = false;
    });
    return;
  }

  // Already been taught — proceed
  G.busy = true;
  proceedWithChoice(choice);
}

function teachSign(sign, onDone) {
  const d = SIGNS[sign];

  // Switch to dialogue
  document.getElementById('choices-wrap').style.display = 'none';
  document.getElementById('dlg-wrap').style.display = 'block';
  document.getElementById('luna').innerHTML = lunaHTML('wave');

  const msgs = {
    yes:    "Oops! That's not how you sign YES 🤚\nYES = close your hand into a fist and nod it forward twice, like a nodding head! Now try again! 👇",
    forest: "Here's how you sign FOREST! 🌳\nFOREST = hold your elbow with one hand, wave your open hand like a swaying tree. Now try! 👇",
    city:   "Here's how you sign CITY! 🏙️\nCITY = point both index fingers and tap the tips together twice. Now try! 👇",
  };
  document.getElementById('dlg-text').textContent = msgs[sign] || 'Watch how to sign this!';

  // Show video inside dialogue box
  let vbox = document.getElementById('teach-inline-vid');
  if (!vbox) {
    vbox = document.createElement('div');
    vbox.id = 'teach-inline-vid';
    vbox.style.cssText = 'border-radius:10px;overflow:hidden;height:140px;margin-top:10px;background:#f0f0f0;flex-shrink:0;';
    document.getElementById('dlg-box').appendChild(vbox);
  }
  vbox.innerHTML = '';
  vbox.style.display = 'block';

  const vid = document.createElement('video');
  vid.autoplay = vid.loop = vid.muted = vid.playsInline = true;
  vid.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block;';
  vid.src = d.url;
  vid.onerror = () => showFallback(vbox, sign);
  vbox.appendChild(vid);

  // Tap to try again
  const tap = document.getElementById('dlg-tap');
  tap.textContent = '▼ TAP TO TRY AGAIN';
  tap.style.display = 'block';
  tap.onclick = function() {
    vbox.style.display = 'none';
    tap.style.display = 'none';
    tap.onclick = tapLine; // restore
    onDone();
  };
}

function proceedWithChoice(choice) {
  const good = choice.next !== 's_no' && choice.next !== 's_no2';
  spawnParticles(good ? 'celebrate' : 'rain');
  if (!G.unlocked.includes(choice.label)) {
    G.unlocked.push(choice.label);
    renderBadges(choice.label);
  }
  addXP(SCENES[G.scene].xp || 0);
  setTimeout(() => {
    if (choice.next.startsWith('end_')) { addXP(30); showEnding(choice.next); }
    else loadScene(choice.next);
  }, 1300);
}

function state_unlocked(w) { return G.unlocked.includes(w); }

/* ══════════════ XP ══════════════ */
function addXP(n) {
  if (!n) return;
  G.xp += n;
  if (G.xp >= 100 * G.level) G.level++;
  document.getElementById('xp-fill').style.width = Math.min(100, G.xp % 100) + '%';
  document.getElementById('xp-num').textContent = G.xp + ' XP';
  document.getElementById('lvl-el').textContent = 'LVL ' + G.level;
}

function renderBadges(highlight) {
  const el = document.getElementById('badges');
  el.innerHTML = '';
  G.unlocked.forEach(w => {
    const b = document.createElement('div');
    b.className = 'badge';
    b.textContent = '🔓 ' + w;
    el.appendChild(b);
  });
}

/* ══════════════ PARTICLES ══════════════ */
function spawnParticles(type) {
  const el = document.getElementById('particles');
  el.innerHTML = '';
  const cols = ['#ffd232','#ff6b6b','#4ade80','#60a5fa','#f472b6','#a78bfa'];
  for (let i = 0; i < (type==='celebrate'?18:10); i++) {
    const p = document.createElement('div');
    p.style.position = 'absolute';
    if (type === 'celebrate') {
      const sz = 8 + (i%3)*4;
      p.style.cssText = `left:${5+i*5}%;bottom:10%;width:${sz}px;height:${sz}px;border-radius:${i%2?'50%':'3px'};background:${cols[i%6]};animation:rise .9s ${i*.04}s ease-out forwards`;
    } else {
      p.style.cssText = `left:${i*10}%;top:-5%;font-size:${16+(i%3)*4}px;animation:fall .85s ${i*.05}s linear forwards`;
      p.textContent = '💧';
    }
    el.appendChild(p);
  }
  setTimeout(() => el.innerHTML = '', 1500);
}

/* ══════════════ ENDING ══════════════ */
function showEnding(type) {
  const forest = type === 'end_forest';
  const forestBg = 'linear-gradient(180deg,#0a1e0a,#0a3018 60%,#061408)';
  const cityBg   = 'linear-gradient(180deg,#020810,#050f20 60%,#0a1628)';
  // Override the shell background so no blue shows anywhere
  document.getElementById('game-shell').style.background = forest ? forestBg : cityBg;
  document.getElementById('scr-ending').style.background = 'transparent';
  drawEndingBg(document.getElementById('ending-bg-art'), forest);
  document.getElementById('end-desc').textContent = forest
    ? 'She was hiding behind a great oak tree! 🌳'
    : 'She was sitting on a city rooftop! 🏙️';
  document.getElementById('end-xp').textContent = '+' + G.xp;
  document.getElementById('end-words').textContent = '✓ YES  ✓ NO  ✓ ' + (forest?'FOREST':'CITY');
  document.getElementById('end-btn').style.background = forest
    ? 'linear-gradient(135deg,#166534,#4ade80)'
    : 'linear-gradient(135deg,#1e3a8a,#60a5fa)';
  showScreen('scr-ending');
}

function restartGame() {
  document.getElementById('game-shell').style.background = 'linear-gradient(180deg,#0a1e0a,#0a3018 60%,#061408)';
  G = { scene:'s1', line:0, xp:0, level:1, unlocked:['YES','NO'], busy:false, taught:[] };
  document.getElementById('xp-fill').style.width = '0%';
  document.getElementById('xp-num').textContent = '0 XP';
  document.getElementById('lvl-el').textContent = 'LVL 1';
  renderBadges();
  startGame();
}

/* ══════════════ CAMERA ══════════════ */
function toggleCam() {
  const view = document.getElementById('cam-view');
  const btn = document.getElementById('cam-btn');
  if (camStream) {
    camStream.getTracks().forEach(t => t.stop()); camStream = null;
    view.style.display = 'none'; btn.textContent = '📷 CAMERA';
  } else {
    navigator.mediaDevices.getUserMedia({video:true}).then(s => {
      camStream = s;
      document.getElementById('cam-video').srcObject = s;
      view.style.display = 'block'; btn.textContent = '📷 HIDE';
    }).catch(() => alert('Camera not available'));
  }
}

/* ══════════════ HELP ══════════════ */
function openHelp() {
  const sc = SCENES[G.scene];

  const el = document.getElementById('modal-signs');
  el.innerHTML = '';
  sc.choices.forEach(c => {
    const div = document.createElement('div'); div.className = 'msign';
    div.appendChild(makeVideo(c.sign));
    const lbl = document.createElement('div'); lbl.className = 'msign-lbl'; lbl.textContent = c.label;
    div.appendChild(lbl); el.appendChild(div);
  });
  document.getElementById('modal').classList.add('open');
}
function closeHelp() { document.getElementById('modal').classList.remove('open'); }
