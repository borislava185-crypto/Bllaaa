function Starfield() {
const stars = useRef(
Array.from({length:80},(_,i)=>({
x: Math.random()*100, y: Math.random()*100,
s: .5+Math.random()*2.5, d: Math.random()*4+“s”,
o: .2+Math.random()*.8,
}))
).current;
return (
<div style={{position:“absolute”,inset:0,overflow:“hidden”,zIndex:0}}>
{stars.map((s,i)=>(
<div key={i} style={{
position:“absolute”, left:`${s.x}%`, top:`${s.y}%`,
width:s.s, height:s.s, borderRadius:“50%”, background:“white”,
opacity:s.o, animation:`starTwinkle ${s.d} ease-in-out infinite`,
animationDelay:`${Math.random()*4}s`,
}}/>
))}
</div>
);
}

/* ═══════════════════════════════════════════════════════════════
BSL HAND ANIMATIONS  —  Option 2 + 3
─────────────────────────────────────────────────────────────
Each sign is drawn as a detailed SVG hand (skin, knuckles,
nails, palm shading, wrist) and animated through a sequence
of keyframe “poses” using React useEffect frame cycling.

Signs implemented:
YES    – right fist, knuckles forward, nods forward×2
NO     – both fists pinky-up, tap inward×2  (2 hands)
FOREST – dominant flat hand rises from non-dom elbow, sways
CITY   – dominant index taps non-dominant index tip ×2
═══════════════════════════════════════════════════════════════ */

/* ── Skin tone palette ─────────────────────────────────────── */
const S = {
light:  “#f5c898”,   // dorsal highlight
mid:    “#e8a870”,   // main dorsal
dark:   “#c87840”,   // shadow / crease
palm:   “#dda060”,   // palm face (slightly darker)
deep:   “#a05828”,   // deep crease
nail:   “#f0d0b8”,   // nail plate
nailRim:”#d09878”,   // nail rim / lunula
white:  “rgba(255,255,255,0.22)”,  // knuckle hi
arm:    “#d09060”,   // forearm
};

/* ── useFrames: cycles through an array of frame indices ─── */
function useFrames(frames, ms=120) {
const [i, setI] = useState(0);
useEffect(()=>{
let idx = 0;
function tick() {
idx = (idx+1) % frames.length;
setI(idx);
}
// use the per-frame timing if frames is array of [frameIdx, delay]
// otherwise equal spacing
const iv = setInterval(tick, ms);
return ()=>clearInterval(iv);
},[]);
return frames[i];
}

/* ─────────────────────────────────────────────────────────────
SHARED HAND PARTS
All coords in a 120×160 viewBox, wrist at bottom-centre.
Fingers radiate upward. We draw the dominant (right) hand
viewed from ~35° angle — slightly side-on so depth reads.
───────────────────────────────────────────────────────────── */

/* Wrist + forearm stub */
function Wrist({y=130, w=54}) {
return <>
<rect x={60-w/2} y={y} width={w} height={36} rx={16} fill={S.arm}/>
<rect x={60-w/2+4} y={y} width={w-8} height={36} rx={13} fill={S.mid}/>
{/* wrist crease */}
<path d={`M${60-w/2+6} ${y+6} Q60 ${y+12} ${60+w/2-6} ${y+6}`}
stroke={S.dark} strokeWidth=“1.2” fill=“none” strokeLinecap=“round” opacity=”.5”/>
</>;
}

/* Palm slab — the back of the hand */
function Palm({x=60,y=90,w=58,h=46,rx=14,rotate=0,cx=60,cy=110}) {
return <g transform={`rotate(${rotate},${cx},${cy})`}>
<rect x={x-w/2} y={y-h} width={w} height={h} rx={rx} fill={S.mid}/>
{/* side shading */}
<rect x={x-w/2} y={y-h+8} width={8} height={h-8} rx={4} fill={S.dark} opacity=".35"/>
{/* palm crease lines */}
<path d={`M${x-w/2+10} ${y-20} Q${x} ${y-14} ${x+w/2-10} ${y-20}`}
stroke={S.dark} strokeWidth=“1” fill=“none” strokeLinecap=“round” opacity=”.3”/>
<path d={`M${x-w/2+10} ${y-32} Q${x} ${y-28} ${x+w/2-10} ${y-32}`}
stroke={S.dark} strokeWidth=“1” fill=“none” strokeLinecap=“round” opacity=”.2”/>
</g>;
}

/* One finger — rect with rounded top, nail, knuckle lines
x,y = base centre; len = length; w = width; curl = 0..1 (1=fully curled)
rot = rotation angle around base (positive = curl toward palm) */
function Finger({x, y, len, w=11, curl=0, rot=0, nail=true, cx, cy}) {
const bx = cx ?? x;
const by = cy ?? y;
// curled: shorten visible length, add bend
const vis = len * (1 - curl*0.55);
const bend = curl * 28; // degrees of arc
return (
<g transform={`rotate(${rot+bend},${bx},${by})`}>
{/* finger shaft */}
<rect x={x-w/2} y={y-vis} width={w} height={vis} rx={w/2} fill={S.mid}/>
{/* side shade */}
<rect x={x-w/2} y={y-vis} width={3} height={vis} rx={1.5} fill={S.dark} opacity=".3"/>
{/* highlight */}
<rect x={x-w/2+3} y={y-vis+4} width={w-8} height={vis*0.4} rx={2} fill={S.white}/>
{/* knuckle bumps */}
{[0.35,0.6].map((t,i)=>(
<ellipse key={i} cx={x} cy={y-vis*t} rx={w/2+1} ry={3.5}
fill={S.mid} stroke={S.dark} strokeWidth=".8" opacity=".5"/>
))}
{/* knuckle crease lines */}
<line x1={x-w/2+2} y1={y-vis*0.35} x2={x+w/2-2} y2={y-vis*0.35}
stroke={S.deep} strokeWidth="1" strokeLinecap="round" opacity=".4"/>

/* ═══════════════════════════════════════════════════════

NO:  single fist, SVG group rotates ±38° at wrist

═══════════════════════════════════════════════════════ */

const SKBSL = {
base:   “#D4956A”,
light:  “#EAC090”,
vlight: “#F5D8B8”,
dark:   “#A86840”,
deep:   “#7A4820”,
nail:   “#F0CEAA”,

arm:    “#C07848”,
top:    “#C07040”,
};

function YesDefs({id}) {
return (
<defs>
<radialGradient id={`ypG${id}`} cx=“40%” cy=“35%” r=“68%”>
<stop offset="0%"   stopColor={SKBSL.vlight}/>
<stop offset="55%"  stopColor={SKBSL.base}/>
<stop offset="100%" stopColor={SKBSL.dark}/>
</radialGradient>
<radialGradient id={`ytG${id}`} cx=“32%” cy=“28%” r=“72%”>
<stop offset="0%"   stopColor={SKBSL.light}/>
<stop offset="100%" stopColor={SKBSL.dark}/>
</radialGradient>
<radialGradient id={`yfG${id}`} cx=“38%” cy=“20%” r=“70%”>
<stop offset="0%"   stopColor={SKBSL.vlight}/>
<stop offset="60%"  stopColor={SKBSL.base}/>
<stop offset="100%" stopColor={SKBSL.dark}/>
</radialGradient>
<radialGradient id={`ysG${id}`} cx=“50%” cy=“30%” r=“70%”>
<stop offset="0%"   stopColor={SKBSL.light}/>
<stop offset="100%" stopColor={SKBSL.top}/>
</radialGradient>
<filter id={`yf${id}`}>
<feDropShadow dx="2" dy="6" stdDeviation="6" floodColor="#00000050"/>
</filter>
</defs>
);
}

/* One capsule finger — shaft + knuckle + PIP crease + tip + nail + separator */
function Fgr({id, x,y,w,h,rx, kx,ky,krx,kry, py, tx,ty,trx,try_, nx,ny,nrx,nry, sx}) {
return <>
<rect x={x} y={y} width={w} height={h} rx={rx} fill={`url(#yfG${id})`}/>
<rect x={x} y={y+4} width={4} height={h-8} rx={2} fill={SKBSL.dark} opacity=".28"/>
<rect x={x+7} y={y+4} width={w-10} height={h*0.38} rx={3} fill={SKBSL.vlight} opacity=".42"/>
<ellipse cx={kx} cy={ky} rx={krx} ry={kry} fill={SKBSL.vlight} opacity=".92"/>
<ellipse cx={kx} cy={ky-kry*0.35} rx={krx*0.68} ry={kry*0.58} fill="white" opacity=".32"/>
<path d={`M ${kx-krx} ${ky+kry*0.2} Q ${kx} ${ky-kry*0.1} ${kx+krx} ${ky+kry*0.2}`}
stroke={SKBSL.deep} strokeWidth=“1.9” fill=“none” strokeLinecap=“round” opacity=”.58”/>
<path d={`M ${x+2} ${py} Q ${kx} ${py-4} ${x+w-2} ${py}`}
stroke={SKBSL.deep} strokeWidth=“1.3” fill=“none” strokeLinecap=“round” opacity=”.44”/>
{sx && <line x1={sx} y1={ky-kry} x2={sx} y2={ty+try_} stroke={SKBSL.deep} strokeWidth="2" opacity=".32"/>}
<ellipse cx={tx} cy={ty} rx={trx} ry={try_} fill={SKBSL.base}/>
<ellipse cx={tx} cy={ty+try_*0.35} rx={trx*0.85} ry={try_*0.6} fill={SKBSL.dark} opacity=".18"/>
<path d={`M ${tx-trx+1} ${ty-try_*0.12} Q ${tx} ${ty-try_*0.4} ${tx+trx-1} ${ty-try_*0.12}`}
stroke={SKBSL.deep} strokeWidth=“1.1” fill=“none” strokeLinecap=“round” opacity=”.4”/>
<ellipse cx={nx} cy={ny} rx={nrx} ry={nry} fill={SKBSL.nail} opacity=".9"/>
<ellipse cx={nx} cy={ny} rx={nrx} ry={nry} fill="none" stroke={SKBSL.nailRm} strokeWidth="1.1" opacity=".62"/>
<ellipse cx={nx-nrx*0.3} cy={ny-nry*0.3} rx={nrx*0.35} ry={nry*0.4} fill="white" opacity=".32"/>
</>;
}

/* Thumb shape */
function Thm({id, body, c1, c2, hi, nx, ny, nr}) {
return <>
<path d={body} fill={`url(#ytG${id})`} filter={`url(#yf${id})`}/>
<path d={body} fill={SKBSL.vlight} opacity=".22"/>

</>;
}

}

function Particles({type}) {
if (!type) return null;
const confettiColors = [”#ffd232”,”#ff6b6b”,”#4ade80”,”#60a5fa”,”#f472b6”,”#a78bfa”];
const count = type===“celebrate”?24:16;
return (
<div style={{position:“absolute”,inset:0,pointerEvents:“none”,overflow:“hidden”,zIndex:20}}>
{Array.from({length:count}).map((_,i)=>(
type===“celebrate” ? (
<div key={i} style={{
position:“absolute”,
left:`${5+i*3.8}%`, bottom:“15%”,
width:8+i%4*4, height:8+i%3*4,
borderRadius: i%3===0?“50%”:i%3===1?“2px”:“0”,
background:confettiColors[i%6],
animation:`celebConfetti ${.8+i*.06}s ${i*.04}s ease-out forwards`,
}}/>
) : (
<div key={i} style={{
position:“absolute”,
left:`${i*6.2}%`, top:”-10%”,
fontSize:16+i%3*6,
animation:`rainDrop ${.8+i*.08}s ${i*.05}s linear forwards`,
}}>💧</div>
)
))}
</div>
);
}

const streamRef = useRef(null);
useEffect(()=>{
if(!active){streamRef.current?.getTracks().forEach(t=>t.stop());return;}
navigator.mediaDevices?.getUserMedia({video:true}).then(s=>{
streamRef.current=s;
if(videoRef.current) videoRef.current.srcObject=s;
}).catch(()=>{});
return()=>streamRef.current?.getTracks().forEach(t=>t.stop());
},[active]);
return (
<div style={{
borderRadius:12,overflow:“hidden”,
border:`2px solid ${C.border}`,
position:“relative”,background:”#000”,
aspectRatio:“4/3”,
}}>
<video ref={videoRef} autoPlay muted playsInline style={{width:“100%”,height:“100%”,objectFit:“cover”,transform:“scaleX(-1)”}}/>
{/* corner decorations */}
{[[0,0,“top”,“left”],[0,“auto”,“top”,“right”],[“auto”,0,“bottom”,“left”],[“auto”,“auto”,“bottom”,“right”]].map(([t,b,tt,ll],i)=>(
<div key={i} style={{position:“absolute”,top:t,bottom:b,left:ll===“left”?0:“auto”,right:ll===“right”?0:“auto”,width:16,height:16,
borderTop:i<2?`2px solid ${C.accent}`:“none”,
borderBottom:i>=2?`2px solid ${C.accent}`:“none”,
borderLeft:i%2===0?`2px solid ${C.accent}`:“none”,
borderRight:i%2===1?`2px solid ${C.accent}`:“none”,
}}/>
))}
<div style={{position:“absolute”,bottom:6,left:“50%”,transform:“translateX(-50%)”,
background:“rgba(0,0,0,.7)”,border:`1px solid ${C.border}`,borderRadius:20,
padding:“3px 12px”,fontFamily:”‘Press Start 2P’”,fontSize:7,color:C.green,

}}>● REC</div>
</div>
);
}

const [xp, setXp] = useState(0);

const [walking, setWalking] = useState(false);
const [endingXp, setEndingXp] = useState(0);
const autoRef = useRef(null);

const scene = STORY[sceneId];

const gainXp = (amt) => {
if(!amt) return;
setXp(prev=>{
const next = prev+amt;
if(next >= 100*(level)) setLevel(l=>l+1);
return next;
});
};

const nextLine = useCallback(()=>{
if(!scene||scene.isEnding) return;
if(lineIdx < scene.lines.length-1) {
setLineIdx(i=>i+1);
} else {
setPhase(“choose”);
}
},[scene,lineIdx]);

// Auto-advance for slower readers
useEffect(()=>{
if(phase!==“dialogue”) return;
clearTimeout(autoRef.current);
autoRef.current = setTimeout(nextLine, 3500);
return()=>clearTimeout(autoRef.current);
},[phase,lineIdx,nextLine]);

useEffect(()=>{
setLineIdx(0); setPhase(“dialogue”); setParticles(null);
setChoiceDisabled(false); setWalking(true);
setTimeout(()=>setWalking(false),700);
},[sceneId]);

const handleChoice = (choice) => {
if(choiceDisabled) return;
setChoiceDisabled(true);

```

setParticles(isPositive?"celebrate":"rain");

// Unlock new word
if(!unlocked.includes(choice.label)) {
  setUnlocked(w=>[...w,choice.label]);
  setNewWord(choice.label);
  setTimeout(()=>setNewWord(null),3000);
}

gainXp(scene.xpGain||0);

if(!isPositive) {
  setShaking(true);
  setTimeout(()=>setShaking(false),500);
}

setTimeout(()=>{
  setParticles(null);
  if(choice.next.startsWith("end_")) {
    setEndingXp(STORY[choice.next].xpGain);
    gainXp(STORY[choice.next].xpGain);
    setScreen("ending_"+STORY[choice.next].endingType);
  } else {
    setSceneId(choice.next);
  }
},1600);
